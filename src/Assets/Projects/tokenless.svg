<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060611"/>
      <stop offset="100%" style="stop-color:#0d0820"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg2)"/>

  <!-- Grid -->
  <g opacity="0.05" stroke="#C770F0" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="80" y1="0" x2="80" y2="500"/><line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="240" y1="0" x2="240" y2="500"/><line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/><line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="560" y1="0" x2="560" y2="500"/><line x1="640" y1="0" x2="640" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
  </g>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="44" fill="rgba(199,112,240,0.06)" stroke="rgba(199,112,240,0.2)" stroke-width="1"/>
  <circle cx="18" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="36" cy="22" r="6" fill="#FEBC2E"/>
  <circle cx="54" cy="22" r="6" fill="#28C840"/>
  <text x="75" y="27" font-family="'Courier New', monospace" font-size="12" fill="rgba(199,112,240,0.8)">TokenLess — AI Token Optimization Hub</text>
  <text x="650" y="27" font-family="'Courier New', monospace" font-size="11" fill="rgba(0,212,255,0.5)">Open Source</text>

  <!-- Token cost bar chart going DOWN (optimization effect) -->
  <text x="30" y="75" font-family="'Courier New', monospace" font-size="10" fill="rgba(199,112,240,0.7)">Token Cost Reduction Per Workflow</text>

  <!-- Before bar -->
  <rect x="40" y="90" width="80" height="220" rx="4" fill="rgba(255,60,60,0.2)" stroke="rgba(255,60,60,0.4)" stroke-width="1"/>
  <text x="80" y="108" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,100,100,0.8)" text-anchor="middle">100k</text>
  <text x="80" y="322" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,100,100,0.7)" text-anchor="middle">BEFORE</text>

  <!-- Arrow down -->
  <text x="150" y="200" font-family="'Courier New', monospace" font-size="20" fill="#00FF41">→</text>

  <!-- After applying skills bar -->
  <rect x="185" y="200" width="80" height="110" rx="4" fill="rgba(0,212,255,0.15)" stroke="rgba(0,212,255,0.4)" stroke-width="1"/>
  <text x="225" y="218" font-family="'Courier New', monospace" font-size="9" fill="rgba(0,212,255,0.8)" text-anchor="middle">50k</text>
  <text x="225" y="322" font-family="'Courier New', monospace" font-size="9" fill="rgba(0,212,255,0.7)" text-anchor="middle">CACHED</text>

  <!-- After optimized -->
  <rect x="300" y="240" width="80" height="70" rx="4" fill="rgba(0,255,65,0.12)" stroke="#00FF41" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="340" y="260" font-family="'Courier New', monospace" font-size="9" fill="#00FF41" text-anchor="middle">22k</text>
  <text x="340" y="322" font-family="'Courier New', monospace" font-size="9" fill="#00FF41" text-anchor="middle">OPTIMIZED</text>

  <text x="80" y="350" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.3)">Baseline</text>
  <text x="185" y="350" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.3)">w/ Caching</text>
  <text x="296" y="350" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.3)">w/ TokenLess</text>

  <!-- Big stat -->
  <text x="80" y="400" font-family="'Courier New', monospace" font-size="28" fill="#00FF41" filter="url(#glow2)">-78%</text>
  <text x="80" y="420" font-family="'Courier New', monospace" font-size="10" fill="rgba(0,255,65,0.6)">token cost reduction</text>

  <!-- Vertical divider -->
  <line x1="430" y1="55" x2="430" y2="450" stroke="rgba(199,112,240,0.15)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Skills panel -->
  <text x="450" y="75" font-family="'Courier New', monospace" font-size="10" fill="rgba(199,112,240,0.7)">Reusable AI Skill Packs</text>

  <!-- Skill 1 -->
  <rect x="450" y="88" width="320" height="38" rx="6" fill="rgba(0,255,65,0.06)" stroke="rgba(0,255,65,0.25)" stroke-width="1"/>
  <text x="466" y="105" font-family="'Courier New', monospace" font-size="10" fill="#00FF41">💰 Token &amp; Cost Tracking</text>
  <text x="466" y="120" font-family="'Courier New', monospace" font-size="8" fill="rgba(0,255,65,0.5)">Real-time spend monitoring per agent call</text>

  <!-- Skill 2 -->
  <rect x="450" y="134" width="320" height="38" rx="6" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.25)" stroke-width="1"/>
  <text x="466" y="151" font-family="'Courier New', monospace" font-size="10" fill="#00D4FF">⚡ Context Optimization</text>
  <text x="466" y="166" font-family="'Courier New', monospace" font-size="8" fill="rgba(0,212,255,0.5)">Compress, prune and reuse context windows</text>

  <!-- Skill 3 -->
  <rect x="450" y="180" width="320" height="38" rx="6" fill="rgba(199,112,240,0.06)" stroke="rgba(199,112,240,0.25)" stroke-width="1"/>
  <text x="466" y="197" font-family="'Courier New', monospace" font-size="10" fill="#C770F0">🛠️ Enterprise Skill Packs</text>
  <text x="466" y="212" font-family="'Courier New', monospace" font-size="8" fill="rgba(199,112,240,0.5)">Drop-in skills for Claude Code, Windsurf, Copilot</text>

  <!-- Skill 4 -->
  <rect x="450" y="226" width="320" height="38" rx="6" fill="rgba(254,188,46,0.06)" stroke="rgba(254,188,46,0.25)" stroke-width="1"/>
  <text x="466" y="243" font-family="'Courier New', monospace" font-size="10" fill="#FEBC2E">📚 Training Paths</text>
  <text x="466" y="258" font-family="'Courier New', monospace" font-size="8" fill="rgba(254,188,46,0.5)">Engineering guidelines for LLM efficiency</text>

  <!-- Skill 5 -->
  <rect x="450" y="272" width="320" height="38" rx="6" fill="rgba(0,255,65,0.06)" stroke="rgba(0,255,65,0.25)" stroke-width="1"/>
  <text x="466" y="289" font-family="'Courier New', monospace" font-size="10" fill="#00FF41">🔒 Security-First Design</text>
  <text x="466" y="304" font-family="'Courier New', monospace" font-size="8" fill="rgba(0,255,65,0.5)">No sensitive data in prompts, audit trails</text>

  <!-- Compatible with -->
  <text x="450" y="335" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.4)">Compatible with:</text>
  <rect x="450" y="342" width="68" height="22" rx="4" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <text x="484" y="357" font-family="'Courier New', monospace" font-size="8" fill="#00D4FF" text-anchor="middle">Claude Code</text>
  <rect x="526" y="342" width="58" height="22" rx="4" fill="rgba(199,112,240,0.08)" stroke="rgba(199,112,240,0.2)" stroke-width="1"/>
  <text x="555" y="357" font-family="'Courier New', monospace" font-size="8" fill="#C770F0" text-anchor="middle">Windsurf</text>
  <rect x="592" y="342" width="48" height="22" rx="4" fill="rgba(0,255,65,0.08)" stroke="rgba(0,255,65,0.2)" stroke-width="1"/>
  <text x="616" y="357" font-family="'Courier New', monospace" font-size="8" fill="#00FF41" text-anchor="middle">MCP</text>
  <rect x="648" y="342" width="58" height="22" rx="4" fill="rgba(254,188,46,0.08)" stroke="rgba(254,188,46,0.2)" stroke-width="1"/>
  <text x="677" y="357" font-family="'Courier New', monospace" font-size="8" fill="#FEBC2E" text-anchor="middle">Copilot</text>

  <!-- Footer -->
  <rect x="0" y="456" width="800" height="44" fill="rgba(0,0,0,0.5)" stroke="rgba(199,112,240,0.1)" stroke-width="1"/>
  <text x="20" y="474" font-family="'Courier New', monospace" font-size="9" fill="rgba(199,112,240,0.5)">⚡ Open Source | Enterprise AI Token Optimization | Reusable Skills for AI Agents</text>
  <text x="20" y="490" font-family="'Courier New', monospace" font-size="9" fill="rgba(0,212,255,0.4)">github.com/ibrahimsaleem/TokenLess</text>
  <text x="750" y="482" font-family="'Courier New', monospace" font-size="9" fill="rgba(0,255,65,0.4)" text-anchor="end">TokenLess</text>
</svg>
