<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060611"/>
      <stop offset="100%" style="stop-color:#001810"/>
    </linearGradient>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(0,255,65,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(0,255,65,0.04)"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg3)"/>

  <!-- Grid -->
  <g opacity="0.05" stroke="#00FF41" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="44" fill="rgba(0,255,65,0.06)" stroke="rgba(0,255,65,0.2)" stroke-width="1"/>
  <circle cx="18" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="36" cy="22" r="6" fill="#FEBC2E"/>
  <circle cx="54" cy="22" r="6" fill="#28C840"/>
  <text x="75" y="27" font-family="'Courier New', monospace" font-size="12" fill="rgba(0,255,65,0.8)">ClawProtect — Defense-in-Depth AI Agent Gateway</text>

  <!-- Left: Architecture Stack -->
  <text x="25" y="70" font-family="'Courier New', monospace" font-size="10" fill="rgba(0,255,65,0.7)">Security Architecture Stack</text>

  <!-- Layer 1: AI Agent -->
  <rect x="20" y="80" width="340" height="42" rx="6" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.35)" stroke-width="1.5"/>
  <text x="35" y="98" font-family="'Courier New', monospace" font-size="10" fill="#00D4FF">🤖  AI Agent (LLM + Tools + MCP Servers)</text>
  <text x="35" y="114" font-family="'Courier New', monospace" font-size="8" fill="rgba(0,212,255,0.5)">Claude / GPT / Ollama + tool calls + external APIs</text>

  <!-- Down arrow -->
  <text x="185" y="140" font-family="'Courier New', monospace" font-size="14" fill="rgba(0,255,65,0.6)" text-anchor="middle">↓</text>

  <!-- Layer 2: Content-Aware Proxy -->
  <rect x="20" y="148" width="340" height="52" rx="6" fill="rgba(255,0,60,0.06)" stroke="rgba(255,0,60,0.35)" stroke-width="1.5"/>
  <text x="35" y="167" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,68,68,0.9)">🔐  Content-Aware Security Proxy</text>
  <text x="35" y="182" font-family="'Courier New', monospace" font-size="8" fill="rgba(255,100,100,0.6)">Prompt injection · PII · secrets · vuln patterns</text>
  <rect x="290" y="155" width="60" height="16" rx="3" fill="rgba(255,0,60,0.15)" stroke="rgba(255,0,60,0.3)" stroke-width="1"/>
  <text x="320" y="167" font-family="'Courier New', monospace" font-size="7" fill="rgba(255,100,100,0.8)" text-anchor="middle">ACTIVE</text>

  <!-- Down arrow -->
  <text x="185" y="218" font-family="'Courier New', monospace" font-size="14" fill="rgba(0,255,65,0.6)" text-anchor="middle">↓</text>

  <!-- Layer 3: eBPF -->
  <rect x="20" y="226" width="340" height="52" rx="6" fill="rgba(199,112,240,0.06)" stroke="rgba(199,112,240,0.35)" stroke-width="1.5"/>
  <text x="35" y="245" font-family="'Courier New', monospace" font-size="10" fill="#C770F0">⚙️  eBPF Kernel Monitor</text>
  <text x="35" y="260" font-family="'Courier New', monospace" font-size="8" fill="rgba(199,112,240,0.6)">syscall-level visibility · process tracking · file I/O</text>
  <rect x="290" y="233" width="60" height="16" rx="3" fill="rgba(199,112,240,0.12)" stroke="rgba(199,112,240,0.3)" stroke-width="1"/>
  <text x="320" y="245" font-family="'Courier New', monospace" font-size="7" fill="#C770F0" text-anchor="middle">KERNEL</text>

  <!-- Down arrow -->
  <text x="185" y="296" font-family="'Courier New', monospace" font-size="14" fill="rgba(0,255,65,0.6)" text-anchor="middle">↓</text>

  <!-- Layer 4: Egress Firewall -->
  <rect x="20" y="304" width="340" height="52" rx="6" fill="rgba(254,188,46,0.06)" stroke="rgba(254,188,46,0.35)" stroke-width="1.5"/>
  <text x="35" y="323" font-family="'Courier New', monospace" font-size="10" fill="#FEBC2E">🔥  Egress Firewall</text>
  <text x="35" y="338" font-family="'Courier New', monospace" font-size="8" fill="rgba(254,188,46,0.6)">Strict outbound policy · allowlist enforcement</text>
  <rect x="290" y="311" width="60" height="16" rx="3" fill="rgba(254,188,46,0.12)" stroke="rgba(254,188,46,0.3)" stroke-width="1"/>
  <text x="320" y="323" font-family="'Courier New', monospace" font-size="7" fill="#FEBC2E" text-anchor="middle">ENFORCED</text>

  <!-- Down arrow -->
  <text x="185" y="374" font-family="'Courier New', monospace" font-size="14" fill="rgba(0,255,65,0.6)" text-anchor="middle">↓</text>

  <!-- Layer 5: Cross-layer Event Bus -->
  <rect x="20" y="382" width="340" height="52" rx="6" fill="rgba(0,255,65,0.08)" stroke="#00FF41" stroke-width="1.5" filter="url(#glow3)"/>
  <text x="35" y="401" font-family="'Courier New', monospace" font-size="10" fill="#00FF41">📊  Cross-Layer Adaptive Event Bus</text>
  <text x="35" y="416" font-family="'Courier New', monospace" font-size="8" fill="rgba(0,255,65,0.6)">SIEM / Splunk · audit logs · adaptive response</text>
  <rect x="290" y="389" width="60" height="16" rx="3" fill="rgba(0,255,65,0.15)" stroke="#00FF41" stroke-width="1"/>
  <text x="320" y="401" font-family="'Courier New', monospace" font-size="7" fill="#00FF41" text-anchor="middle">LOGGING</text>

  <!-- Right: Live Event Feed -->
  <line x1="395" y1="55" x2="395" y2="450" stroke="rgba(0,255,65,0.12)" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="415" y="70" font-family="'Courier New', monospace" font-size="10" fill="rgba(0,255,65,0.7)">Live Event Feed</text>

  <rect x="415" y="80" width="365" height="360" rx="6" fill="rgba(0,3,10,0.95)" stroke="rgba(0,255,65,0.15)" stroke-width="1"/>

  <text x="428" y="108" font-family="'Courier New', monospace" font-size="8.5" fill="rgba(255,68,68,0.9)">[BLOCK]  Prompt injection attempt in tool param</text>
  <text x="428" y="126" font-family="'Courier New', monospace" font-size="8.5" fill="#00FF41">[ALLOW]  read_file("./config.yml") → approved</text>
  <text x="428" y="144" font-family="'Courier New', monospace" font-size="8.5" fill="rgba(255,68,68,0.9)">[BLOCK]  Secret detected: AWS_ACCESS_KEY_ID in output</text>
  <text x="428" y="162" font-family="'Courier New', monospace" font-size="8.5" fill="#00FF41">[ALLOW]  HTTP GET api.internal/v2/data → approved</text>
  <text x="428" y="180" font-family="'Courier New', monospace" font-size="8.5" fill="rgba(254,188,46,0.9)">[WARN]   syscall execve() → unusual child process</text>
  <text x="428" y="198" font-family="'Courier New', monospace" font-size="8.5" fill="rgba(255,68,68,0.9)">[BLOCK]  Egress to 198.51.100.4 → not in allowlist</text>
  <text x="428" y="216" font-family="'Courier New', monospace" font-size="8.5" fill="#00FF41">[ALLOW]  write_file("output.json") → approved</text>
  <text x="428" y="234" font-family="'Courier New', monospace" font-size="8.5" fill="rgba(199,112,240,0.9)">[AUDIT]  Tool call: bash("ls -la") → logged</text>
  <text x="428" y="252" font-family="'Courier New', monospace" font-size="8.5" fill="rgba(255,68,68,0.9)">[BLOCK]  PII detected: SSN pattern in completion</text>
  <text x="428" y="270" font-family="'Courier New', monospace" font-size="8.5" fill="#00FF41">[ALLOW]  MCP tool: search_docs() → permitted</text>
  <text x="428" y="288" font-family="'Courier New', monospace" font-size="8.5" fill="rgba(254,188,46,0.9)">[WARN]   High-entropy string in API response</text>
  <text x="428" y="306" font-family="'Courier New', monospace" font-size="8.5" fill="#00FF41">[ALLOW]  shell("cat README.md") → approved</text>
  <text x="428" y="324" font-family="'Courier New', monospace" font-size="8.5" fill="rgba(199,112,240,0.9)">[AUDIT]  Adaptive rule triggered → severity HIGH</text>
  <text x="428" y="342" font-family="'Courier New', monospace" font-size="8.5" fill="rgba(0,212,255,0.5)">_▮</text>

  <!-- Stats strip at bottom right -->
  <rect x="415" y="358" width="365" height="82" rx="4" fill="rgba(0,5,15,0.9)" stroke="rgba(0,255,65,0.1)" stroke-width="1"/>
  <text x="430" y="378" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.3)">Session Summary</text>
  <text x="430" y="398" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,68,68,0.9)">■ Blocked: 14</text>
  <text x="550" y="398" font-family="'Courier New', monospace" font-size="10" fill="#00FF41">■ Allowed: 89</text>
  <text x="430" y="418" font-family="'Courier New', monospace" font-size="10" fill="rgba(254,188,46,0.9)">■ Warned: 7</text>
  <text x="550" y="418" font-family="'Courier New', monospace" font-size="10" fill="rgba(199,112,240,0.9)">■ Audited: 41</text>
  <text x="430" y="432" font-family="'Courier New', monospace" font-size="9" fill="rgba(0,255,65,0.4)">Zero unauthorized egress events</text>

  <!-- Footer -->
  <rect x="0" y="456" width="800" height="44" fill="rgba(0,0,0,0.5)" stroke="rgba(0,255,65,0.1)" stroke-width="1"/>
  <text x="20" y="474" font-family="'Courier New', monospace" font-size="9" fill="rgba(0,255,65,0.5)">🛡️ Defense-in-Depth | eBPF Kernel Monitoring | Content-Aware Proxy | Egress Firewall</text>
  <text x="20" y="490" font-family="'Courier New', monospace" font-size="9" fill="rgba(0,212,255,0.4)">github.com/ibrahimsaleem/ClawProtect</text>
  <text x="750" y="482" font-family="'Courier New', monospace" font-size="9" fill="rgba(0,255,65,0.4)" text-anchor="end">ClawProtect v1.0</text>
</svg>
