  <text x="30" y="354" font-family="'Courier New', monospace" font-size="8.5" fill="#00FF41">[✓] Report generated: eviltrace_report_2026.pdf</text>
  <text x="30" y="372" font-family="'Courier New', monospace" font-size="8.5" fill="rgba(0,212,255,0.5)">_▮</text>

